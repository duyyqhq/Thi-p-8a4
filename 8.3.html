<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp 8/3 - 8A4</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#ffc3e0);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
overflow:hidden;
}

/* khung */

.box{
text-align:center;
}

h2{
color:white;
margin-bottom:15px;
}

input{
padding:10px;
border-radius:12px;
border:none;
width:200px;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:12px;
background:#ff4d8d;
color:white;
font-size:16px;
cursor:pointer;
}

/* phong bì 3D */

.envelope{
width:280px;
height:180px;
position:relative;
margin:20px auto;
perspective:1000px;
display:none;
cursor:pointer;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:#ff8fb1;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.envelope-flap{
position:absolute;
width:100%;
height:90px;
background:#ff4d8d;
top:0;
left:0;
transform-origin:top;
transition:0.6s;
clip-path:polygon(0 0,100% 0,50% 100%);
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* thiệp */

.card{
position:absolute;
top:40px;
left:25px;
width:230px;
background:white;
padding:15px;
border-radius:14px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transform:translateY(40px);
opacity:0;
transition:0.6s;
}

.envelope.open .card{
transform:translateY(-50px);
opacity:1;
}

#title{
color:#ff4d8d;
font-weight:bold;
margin-bottom:8px;
}

#name{
font-weight:bold;
margin-bottom:8px;
}

#wish{
font-size:14px;
line-height:1.4;
color:#444;
}

/* hoa rơi */

.flower{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

.music-btn{
position:fixed;
bottom:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:12px;
background:#ff4d8d;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Thiệp 8/3 lớp 8A4 🌸</h2>

<input id="stt" placeholder="Nhập số thứ tự">

<br>

<button onclick="showEnvelope()">Xem thiệp</button>

<div class="envelope" id="envelope" onclick="openEnvelope()">

<div class="envelope-body"></div>
<div class="envelope-flap"></div>

<div class="card">

<div id="title">🌸 Happy Women's Day 🌸</div>

<div id="name"></div>

<p id="wish"></p>

</div>

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/14/audio_8c6c5a3b1f.mp3">
</audio>

<button class="music-btn" onclick="playMusic()">🎵 Nhạc</button>

<script>

const female={
1:"Đào Ngọc Bảo Châu",
2:"Đinh Ngọc Bảo Châu",
3:"Hồ Thị Mỹ Duyên",
4:"Cao Nguyễn Trúc Mai",
5:"Dương Thảo My",
6:"Đoàn Ngọc Bảo Ngân",
7:"Trương Ngọc Huỳnh Nhi",
8:"Cao Thị Kim Nguyên",
9:"Mai Hồ Huỳnh Như",
10:"Nguyễn Ngọc Huỳnh Như",
11:"Nguyễn Thị Như Quỳnh",
12:"Nguyễn Phương Quỳnh",
13:"Lê Ngọc Thiện",
14:"Trần Lê Anh Thư",
15:"Nguyễn Trần Anh Thư",
16:"Nguyễn Thị Yến Trinh",
17:"Cao Thị Cẩm Tú",
18:"Mai Ngọc Ngân Vy",
19:"Nguyễn Huỳnh Như Ý"
}

let text=""
let i=0

function showEnvelope(){

let stt=document.getElementById("stt").value

if(female[stt]){

let name=female[stt]

document.getElementById("envelope").style.display="block"

document.getElementById("name").innerText=name

text="🌸 Nhân ngày Quốc tế Phụ nữ 8/3, chúc "+name+" luôn xinh đẹp, vui vẻ, học giỏi và đạt nhiều thành tích tốt trong học tập. Chúc bạn luôn tự tin, tỏa sáng và có thật nhiều niềm vui trong cuộc sống. Chúc ngày 8/3 của bạn thật ý nghĩa và hạnh phúc! 💐"

document.getElementById("wish").innerText=""

i=0

}
else if(stt>=20 && stt<=37){

alert("Bạn không phải đối tượng nhận thiệp 😆")

}
else{

alert("STT không hợp lệ")

}

}

function openEnvelope(){

document.getElementById("envelope").classList.add("open")

typeWriter()

}

function typeWriter(){

if(i<text.length){

document.getElementById("wish").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,25)

}

}

/* hoa rơi */

function createFlower(){

let flower=document.createElement("div")

flower.className="flower"

flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"

flower.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(flower)

setTimeout(()=>{flower.remove()},6000)

}

setInterval(createFlower,400)

/* nhạc */

function playMusic(){
document.getElementById("music").play()
}

</script>

</body>
  </html>
