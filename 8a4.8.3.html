<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3 - 8A4</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#ffc3e0);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
overflow:hidden;
}

/* khung */

.box{
text-align:center;
padding:10px;
}

h2{
color:white;
margin-bottom:15px;
font-size:22px;
}

input{
padding:12px;
border-radius:12px;
border:none;
width:70%;
max-width:250px;
font-size:16px;
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:12px;
background:#ff4d8d;
color:white;
font-size:16px;
cursor:pointer;
}

/* phong bì */

.envelope{
width:90%;
max-width:320px;
height:200px;
position:relative;
margin:20px auto;
perspective:1000px;
display:none;
cursor:pointer;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:#ff8fb1;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.envelope-flap{
position:absolute;
width:100%;
height:100px;
background:#ff4d8d;
top:0;
left:0;
transform-origin:top;
transition:0.6s;
clip-path:polygon(0 0,100% 0,50% 100%);
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* thiệp */

.card{
position:absolute;
top:40px;
left:50%;
transform:translate(-50%,40px);
width:85%;
max-width:260px;
background:white;
padding:15px;
border-radius:14px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
opacity:0;
transition:0.6s;
font-size:15px;
}

.envelope.open .card{
transform:translate(-50%,-50px);
opacity:1;
}

#title{
color:#ff4d8d;
font-weight:bold;
margin-bottom:8px;
font-size:16px;
}

#name{
font-weight:bold;
margin-bottom:8px;
}

#wish{
font-size:14px;
line-height:1.5;
color:#444;
}

/* hoa rơi */

.flower{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

.music-btn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 16px;
border:none;
border-radius:12px;
background:#ff4d8d;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Thiệp 8/3 lớp 8A4 🌸</h2>

<input id="stt" placeholder="Nhập số thứ tự">

<br>

<button onclick="showEnvelope()">Xem thiệp</button>

<div class="envelope" id="envelope" onclick="openEnvelope()">

<div class="envelope-body"></div>
<div class="envelope-flap"></div>

<div class="card">

<div id="title">🌸 Happy Women's Day 🌸</div>

<div id="name"></div>

<p id="wish"></p>

</div>

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/14/audio_8c6c5a3b1f.mp3">
</audio>

<button class="music-btn" onclick="playMusic()">🎵 Nhạc</button>

<script>

/* giữ nguyên JS của bạn */

</script>

</body>
</html>
